{% set name = "codeentropy" %}
{% set version = "0.0.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  path: ..

build:
  noarch: python
  script: |
    python -m pip install . -vv --no-deps
    PIP_NO_INDEX=0 python -m pip install -vv --index-url https://pypi.org/simple waterEntropy
  entry_points:
    - CodeEntropy=CodeEntropy.cli:main

requirements:
  host:
    - python >=3.12
    - pip
    - flit-core >=3.4,<4
  run:
    - python >=3.12
    - numpy >=2.3,<3.0
    - mdanalysis >=2.10,<3.0
    - pandas >=3.0,<3.1
    - psutil >=7.1,<8.0
    - pyyaml >=6.0,<7.0
    - python-json-logger >=2.0,<3.0
    - rich >=14.2,<15.0
    - python-art >=6.5,<7.0
    - networkx >=3.6,<3.7
    - matplotlib >=3.10,<3.11
    - requests >=2.32,<3.0
    - rdkit>=2025.9.5
    - dask >=2026.1.2,<2026.2.0
    - distributed >=2026.1.2,<2026.2.0
    - dask-jobqueue >=0.9,<0.10
    - pytest-xdist >=3.8, <3.9
    - numba >=0.65.0, <0.7

test:
  imports:
    - CodeEntropy
  commands:
    - CodeEntropy --help

about:
  home: https://ccpbiosim.github.io/CodeEntropy/
  license: MIT
  license_file: LICENSE
  summary: "Entropy analysis tools for macromolecular systems and MD simulation"
